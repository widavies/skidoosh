name: Deploy

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

# Todo: Automatically build and copy the driver static lib as well
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
  
      - name: Publish
        run: |
          dotnet publish skidoosh.csproj \
            -c Release \
            --runtime linux-arm64 \
            --self-contained \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -p:Version=${{ steps.version.outputs.VERSION }} \
            -p:AssemblyVersion=${{ steps.version.outputs.VERSION }} \
            -p:FileVersion=${{ steps.version.outputs.VERSION }} \
            -o publish

      - name: Normalize update.sh line endings
        run: sed -i 's/\r$//' update.sh

      - name: Create GitHub Release
        run: |
          gh release create "${{ github.ref_name }}" \
            publish/skidoosh \
            publish/skidoosh.pdb \
            update.sh \
            --title "Release ${{ github.ref_name }}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
